    <!-- Line 1: comment -->
    <tspan x="52" y="62" fill="#B8A48C">-- Single source of truth for all palette colors</tspan>
    <!-- Line 2: comment -->
    <tspan x="52" y="80" fill="#B8A48C">-- All other formats are generated from these definitions.</tspan>
    <!-- Line 3: empty -->
    <!-- Line 4: local M = {} -->
    <tspan x="52" y="116" fill="#7FA8D4">local</tspan><tspan fill="#FAF0E6"> M </tspan><tspan fill="#DA9050">=</tspan><tspan fill="#FAF0E6"> </tspan><tspan fill="#7FCFCF">{}</tspan>
    <!-- Line 5: empty -->
    <!-- Line 6: M.variants = { "macchiato", "latte" } -->
    <tspan x="52" y="152" fill="#FAF0E6">M</tspan><tspan fill="#DA9050">.</tspan><tspan fill="#FAF0E6">variants </tspan><tspan fill="#DA9050">=</tspan><tspan fill="#FAF0E6"> </tspan><tspan fill="#7FCFCF">{</tspan><tspan fill="#EAC67A"> "macchiato"</tspan><tspan fill="#FAF0E6">, </tspan><tspan fill="#EAC67A">"latte"</tspan><tspan fill="#7FCFCF"> }</tspan>
    <!-- Line 7: empty -->
    <!-- Line 8: M.palettes = { -->
    <tspan x="52" y="188" fill="#FAF0E6">M</tspan><tspan fill="#DA9050">.</tspan><tspan fill="#FAF0E6">palettes </tspan><tspan fill="#DA9050">=</tspan><tspan fill="#FAF0E6"> </tspan><tspan fill="#7FCFCF">{</tspan>
    <!-- Line 9: macchiato = { -->
    <tspan x="52" y="206" fill="#FAF0E6">  macchiato </tspan><tspan fill="#DA9050">=</tspan><tspan fill="#FAF0E6"> </tspan><tspan fill="#7FCFCF">{</tspan>
    <!-- Line 10: variant = "dark", -->
    <tspan x="52" y="224" fill="#FAF0E6">    variant  </tspan><tspan fill="#DA9050">=</tspan><tspan fill="#FAF0E6"> </tspan><tspan fill="#EAC67A">"dark"</tspan><tspan fill="#FAF0E6">,</tspan>
    <!-- Line 11: bg = "#1F1C16", -->
    <tspan x="52" y="242" fill="#FAF0E6">    bg       </tspan><tspan fill="#DA9050">=</tspan><tspan fill="#FAF0E6"> </tspan><tspan fill="#EAC67A">"#1F1C16"</tspan><tspan fill="#FAF0E6">,</tspan>
    <!-- Line 12: fg = "#FAF0E6", -->
    <tspan x="52" y="260" fill="#FAF0E6">    fg       </tspan><tspan fill="#DA9050">=</tspan><tspan fill="#FAF0E6"> </tspan><tspan fill="#EAC67A">"#FAF0E6"</tspan><tspan fill="#FAF0E6">,</tspan>
    <!-- Line 13: red = "#E87777", -->
    <tspan x="52" y="278" fill="#FAF0E6">    red      </tspan><tspan fill="#DA9050">=</tspan><tspan fill="#FAF0E6"> </tspan><tspan fill="#EAC67A">"#E87777"</tspan><tspan fill="#FAF0E6">,</tspan>
    <!-- Line 14: blue = "#7FA8D4", -->
    <tspan x="52" y="296" fill="#FAF0E6">    blue     </tspan><tspan fill="#DA9050">=</tspan><tspan fill="#FAF0E6"> </tspan><tspan fill="#EAC67A">"#7FA8D4"</tspan><tspan fill="#FAF0E6">,</tspan>
    <!-- Line 15: green = "#8CB870", -->
    <tspan x="52" y="314" fill="#FAF0E6">    green    </tspan><tspan fill="#DA9050">=</tspan><tspan fill="#FAF0E6"> </tspan><tspan fill="#EAC67A">"#8CB870"</tspan><tspan fill="#FAF0E6">,</tspan>
    <!-- Line 16: teal = "#6AB8B0", -->
    <tspan x="52" y="332" fill="#FAF0E6">    teal     </tspan><tspan fill="#DA9050">=</tspan><tspan fill="#FAF0E6"> </tspan><tspan fill="#EAC67A">"#6AB8B0"</tspan><tspan fill="#FAF0E6">,</tspan>
    <!-- Line 17: purple = "#B094CC", -->
    <tspan x="52" y="350" fill="#FAF0E6">    purple   </tspan><tspan fill="#DA9050">=</tspan><tspan fill="#FAF0E6"> </tspan><tspan fill="#EAC67A">"#B094CC"</tspan><tspan fill="#FAF0E6">,</tspan>
    <!-- Line 18: }, -->
    <tspan x="52" y="368" fill="#FAF0E6">  </tspan><tspan fill="#7FCFCF">}</tspan><tspan fill="#FAF0E6">,</tspan>
    <!-- Line 19: empty line or ... -->
    <tspan x="52" y="386" fill="#7FCFCF">}</tspan>
    <!-- Line 20: return M -->
    <tspan x="52" y="404" fill="#7FA8D4">return</tspan><tspan fill="#FAF0E6"> M</tspan>
