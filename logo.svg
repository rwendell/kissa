<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
   version="1.1"
   width="1280"
   height="480"
   viewBox="0 0 1280 480"
   xmlns="http://www.w3.org/2000/svg">
  <style>
    :root {
      --kissa-bg: #F5F4F0;
      --kissa-fg: #1F1C16;
      --kissa-fg-dim: #6E6459;
      --kissa-furigana: #91887D;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --kissa-bg: #1F1C16;
        --kissa-fg: #FAF0E6;
        --kissa-fg-dim: #E8D5B7;
        --kissa-furigana: #B8A48C;
      }
    }
    .kanji {
      fill: var(--kissa-fg);
      font-family: 'Noto Serif JP', 'Noto Serif', serif;
      font-size: 220px;
      font-weight: bold;
    }
    .furigana {
      fill: var(--kissa-furigana);
      font-family: 'Noto Sans JP', 'Noto Sans', sans-serif;
      font-size: 58px;
      font-weight: 400;
      text-anchor: middle;
    }
    .pronunciation {
      fill: var(--kissa-fg-dim);
      font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif;
      font-size: 40px;
      letter-spacing: 12px;
      text-transform: lowercase;
      text-anchor: middle;
    }
  </style>
  <rect width="1280" height="480" fill="var(--kissa-bg)" />
  <text x="508" y="145" class="furigana">きっ</text>
  <text x="773" y="145" class="furigana">さ</text>
  <text x="398" y="360" class="kanji">喫</text>
  <text x="663" y="360" class="kanji">茶</text>
  <text x="640" y="440" class="pronunciation">kissa</text>
</svg>