<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
   version="1.1"
   width="1280"
   height="480"
   viewBox="0 0 1280 480"
   xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="organic" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="4" seed="2" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="6" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="rough" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.06" numOctaves="3" seed="7" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="3" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="splash" x="-30%" y="-30%" width="160%" height="160%">
      <feTurbulence type="fractalNoise" baseFrequency="0.08" numOctaves="2" seed="15" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="8" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>
  <style>
    :root {
      --kissa-fg: #1F1C16;
      --kissa-fg-dim: #6E6459;
      --kissa-furigana: #91887D;
      --coffee: #3C2415;
      --coffee-ring: #2C1A0E;
      --milk: #F5F4F0;
      --milk-edge: #E8E7E3;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --kissa-fg: #FAF0E6;
        --kissa-fg-dim: #E8D5B7;
        --kissa-furigana: #B8A48C;
        --coffee: #5C4A30;
        --coffee-ring: #4B3621;
        --milk: #FAF0E6;
        --milk-edge: #E8D5B7;
      }
    }
    .kanji {
      fill: var(--kissa-fg);
      font-family: 'Noto Serif JP', 'Noto Serif', serif;
      font-size: 220px;
      font-weight: bold;
    }
    .furigana {
      fill: var(--kissa-furigana);
      font-family: 'Noto Sans JP', 'Noto Sans', sans-serif;
      font-size: 58px;
      font-weight: 400;
      text-anchor: middle;
    }
    .pronunciation {
      fill: var(--kissa-fg-dim);
      font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif;
      font-size: 40px;
      letter-spacing: 12px;
      text-transform: lowercase;
      text-anchor: middle;
    }
  </style>

  <!-- Coffee ring stains -->
  <g filter="url(#organic)" opacity="0.12">
    <circle cx="160" cy="260" r="90" fill="none" stroke="var(--coffee-ring)" stroke-width="12"/>
  </g>
  <g filter="url(#organic)" opacity="0.08">
    <circle cx="1060" cy="180" r="65" fill="none" stroke="var(--coffee-ring)" stroke-width="8"/>
  </g>
  <g filter="url(#organic)" opacity="0.10">
    <circle cx="900" cy="380" r="50" fill="none" stroke="var(--coffee-ring)" stroke-width="6"/>
  </g>
  <!-- Residual coffee puddle in bottom ring -->
  <g filter="url(#rough)" opacity="0.06">
    <ellipse cx="160" cy="310" rx="55" ry="35" fill="var(--coffee)"/>
  </g>

  <!-- Milk splashes and droplets -->
  <g filter="url(#splash)" opacity="0.10">
    <ellipse cx="280" cy="140" rx="40" ry="30" fill="var(--milk)"/>
  </g>
  <g filter="url(#splash)" opacity="0.07">
    <ellipse cx="1020" cy="360" rx="28" ry="22" fill="var(--milk)"/>
  </g>
  <g filter="url(#splash)" opacity="0.08">
    <ellipse cx="1130" cy="260" rx="18" ry="15" fill="var(--milk)"/>
  </g>
  <!-- Milk cream swirl -->
  <g filter="url(#rough)" opacity="0.05">
    <ellipse cx="170" cy="290" rx="20" ry="12" fill="var(--milk)"/>
  </g>

  <!-- Small coffee droplets -->
  <g filter="url(#rough)" opacity="0.08">
    <circle cx="320" cy="380" r="5" fill="var(--coffee)"/>
    <circle cx="350" cy="400" r="3" fill="var(--coffee)"/>
    <circle cx="290" cy="395" r="4" fill="var(--coffee)"/>
  </g>
  <g filter="url(#rough)" opacity="0.06">
    <circle cx="780" cy="100" r="4" fill="var(--coffee)"/>
    <circle cx="810" cy="85" r="3" fill="var(--coffee)"/>
    <circle cx="760" cy="95" r="2.5" fill="var(--coffee)"/>
  </g>

  <!-- Milk rivulets running down -->
  <g filter="url(#rough)" opacity="0.06">
    <path d="M 1040 190 Q 1045 220 1038 250 Q 1032 275 1035 300" fill="none" stroke="var(--milk)" stroke-width="6" stroke-linecap="round"/>
  </g>

  <!-- Text -->
  <text x="508" y="145" class="furigana">きっ</text>
  <text x="773" y="145" class="furigana">さ</text>
  <text x="398" y="360" class="kanji">喫</text>
  <text x="663" y="360" class="kanji">茶</text>
  <text x="640" y="440" class="pronunciation">kissa</text>
</svg>